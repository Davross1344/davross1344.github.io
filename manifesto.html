<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Manifesto — Dave Read</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #F8F7F2;
      --surface:     #FFFFFF;
      --ink:         #1B1B2A;
      --ink-muted:   #6B6B80;
      --accent:      #E05C3A;
      --accent-soft: #FDE8E1;
      --blue:        #3B5EA6;
      --border:      #E4E3DB;
      --nav-h:       64px;
      --r:           12px;
      --transition:  0.22s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(248,247,242,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 700;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; font-size: 0.9rem; font-weight: 500; }
    .nav-links a { color: var(--ink-muted); transition: color var(--transition); }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }

    .container { max-width: 800px; margin: 0 auto; padding: 0 5vw; }

    .hero {
      padding-top: calc(var(--nav-h) + 5rem);
      padding-bottom: 4rem;
      text-align: center;
    }
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .hero p {
      color: var(--ink-muted);
      font-size: 1.05rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .manifesto-list {
      padding-bottom: 6rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .manifesto-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-top {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .item-number {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 2.2rem;
      line-height: 1.3;
    }

    .item-text h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }
    .item-text p {
      color: var(--ink-muted);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .vote-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .vote-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: none;
      font-family: 'Figtree', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--ink-muted);
      white-space: nowrap;
    }
    .vote-btn:hover:not(:disabled) { border-color: var(--ink-muted); color: var(--ink); }

    .vote-btn.agree.voted {
      background: #E8F5E9;
      border-color: #4CAF50;
      color: #2E7D32;
    }
    .vote-btn.disagree.voted {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .vote-btn:disabled { cursor: default; }

    .vote-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .vote-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .vote-bar-fill {
      height: 100%;
      background: #4CAF50;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .vote-bar-label {
      font-size: 0.7rem;
      color: var(--ink-muted);
      text-align: center;
    }

    footer {
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 2rem 5vw;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
    }

    @media (max-width: 500px) {
      .vote-btn { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">D<span>.</span>R</a>
    <div class="nav-links">
      <a href="index.html#about">About</a>
      <a href="index.html#books">Books</a>
      <a href="index.html#contact">Contact</a>
      <a href="manifesto.html" class="active">Manifesto</a>
    </div>
  </nav>

  <div class="hero">
    <div class="container">
      <p class="section-label">Universal Earth President</p>
      <h1>My Manifesto</h1>
      <p>These are the injustices I will correct on day one of my presidency. Vote on each to confirm I am not alone in this.</p>
    </div>
  </div>

  <div class="container">
    <div class="manifesto-list" id="manifesto-list"></div>
  </div>

  <footer>
    <div class="container">
      <span>&copy; 2026 Dave Read</span>
    </div>
  </footer>

  <script>
    const ITEMS = [
      {
        id: 'tap-filters',
        title: 'Tap filters that make water sprinkly are banned',
        body: 'It takes too long to wash your hands. Water should come out of a tap like water — full flow, immediate, done. Whoever decided a fine mist was desirable has never been in a hurry in their life.'
      },
      {
        id: 'faucet-reach',
        title: 'Faucets must extend over the bowl',
        body: "If washing your hands requires you to touch the back edge of the sink, that's gross. The faucet should reach over the bowl. This is not a luxury requirement. It is basic geometry."
      },
      {
        id: 'power-only-usb',
        title: 'Power-only USB cables that look identical to real cables are a disgrace',
        body: 'A cable that is visually indistinguishable from every other cable but secretly refuses to transfer data is an act of aggression. They must be labelled. They must look different. No more mystery cables.'
      },
    ];

    const STORAGE_KEY = 'manifesto_votes_v2';

    function loadVotes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch (e) { return {}; }
    }

    function saveVotes(votes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
    }

    function buildCard(item, index) {
      const votes       = loadVotes();
      const userVote    = votes[item.id];
      const agreeCount  = votes[item.id + '_a'] || 0;
      const disCount    = votes[item.id + '_d'] || 0;
      const total       = agreeCount + disCount;
      const agreePct    = total ? Math.round((agreeCount / total) * 100) : 50;

      const card = document.createElement('div');
      card.className = 'manifesto-card';

      card.innerHTML = `
        <div class="card-top">
          <div class="item-number">${index + 1}.</div>
          <div class="item-text">
            <h3>${item.title}</h3>
            <p>${item.body}</p>
          </div>
        </div>
        <div class="vote-row">
          <button class="vote-btn agree ${userVote === 'agree' ? 'voted' : ''}"
                  ${userVote ? 'disabled' : ''}>
            👍 Agree <span>${agreeCount}</span>
          </button>
          <div class="vote-bar-wrap">
            <div class="vote-bar">
              <div class="vote-bar-fill" style="width:${agreePct}%"></div>
            </div>
            ${total ? `<div class="vote-bar-label">${agreePct}% agree · ${total} vote${total !== 1 ? 's' : ''}</div>` : '<div class="vote-bar-label">No votes yet</div>'}
          </div>
          <button class="vote-btn disagree ${userVote === 'disagree' ? 'voted' : ''}"
                  ${userVote ? 'disabled' : ''}>
            👎 Disagree <span>${disCount}</span>
          </button>
        </div>
      `;

      card.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const v     = loadVotes();
          const vote  = btn.classList.contains('agree') ? 'agree' : 'disagree';
          v[item.id]         = vote;
          v[item.id + '_a']  = (v[item.id + '_a'] || 0) + (vote === 'agree'    ? 1 : 0);
          v[item.id + '_d']  = (v[item.id + '_d'] || 0) + (vote === 'disagree' ? 1 : 0);
          saveVotes(v);
          const newCard = buildCard(item, index);
          card.replaceWith(newCard);
        });
      });

      return card;
    }

    function render() {
      const list = document.getElementById('manifesto-list');
      list.innerHTML = '';
      ITEMS.forEach((item, i) => list.appendChild(buildCard(item, i)));
    }

    render();
  </script>
</body>
</html>
