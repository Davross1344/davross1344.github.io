<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Places I've Been</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:          #F8F7F2;
    --surface:     #FFFFFF;
    --ink:         #1B1B2A;
    --ink-muted:   #6B6B80;
    --accent:      #E05C3A;
    --accent-soft: #FDE8E1;
    --border:      #E4E3DB;
    --nav-h:       64px;
    --transition:  0.22s cubic-bezier(.4,0,.2,1);

    --visited:        #3DBE6A;
    --visited-hover:  #2EA85A;
    --unvisited:      #B8DCBF;
    --unvisited-hover:#A6CEB0;
    --stroke:         #9ABFA2;
    --stroke-visited: #2A9050;
    --ocean:          #2A7BB5;
    --graticule:      #2470A8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Figtree', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Nav ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: rgba(248,247,242,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5vw;
    z-index: 200;
  }
  .nav-logo { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 700; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 2rem; font-size: 0.9rem; font-weight: 500; }
  .nav-links a { color: var(--ink-muted); transition: color var(--transition); }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    padding-top: var(--nav-h);
  }

  .map-header {
    padding: 1.25rem 5vw;
    display: flex;
    align-items: baseline;
    gap: 1.25rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  .map-header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
  }

  .map-header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .meta {
    font-size: 0.7rem;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ── Map ── */
  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #map { width: 100%; height: 100%; }

  .country {
    cursor: pointer;
    transition: fill 0.15s ease;
  }

  .country.visited {
    fill: var(--visited);
    stroke: var(--stroke-visited);
    stroke-width: 0.5px;
  }
  .country.visited:hover { fill: var(--visited-hover); }

  .country.unvisited {
    fill: var(--unvisited);
    stroke: var(--stroke);
    stroke-width: 0.3px;
  }
  .country.unvisited:hover { fill: var(--unvisited-hover); }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 100;
    max-width: 260px;
  }
  #tooltip.visible { opacity: 1; }

  .tt-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  }

  .tt-country {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .tt-cities {
    font-size: 0.78rem;
    color: var(--ink-muted);
    line-height: 1.8;
  }

  .tt-city { display: block; }
  .tt-city::before {
    content: '—';
    margin-right: 6px;
    color: var(--accent);
    opacity: 0.5;
  }

  /* ── Legend ── */
  .legend {
    position: absolute;
    bottom: 24px;
    left: 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: rgba(248,247,242,0.88);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--ink-muted);
  }

  .legend-swatch {
    width: 16px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid;
  }
  .legend-swatch.visited   { background: var(--visited);   border-color: var(--stroke-visited); }
  .legend-swatch.unvisited { background: var(--unvisited); border-color: var(--stroke); }

  /* ── Count badge ── */
  .count-badge {
    position: absolute;
    bottom: 24px;
    right: 32px;
    text-align: right;
    background: rgba(248,247,242,0.88);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .count-number {
    font-family: 'Fraunces', serif;
    font-size: 3rem;
    color: var(--accent);
    line-height: 1;
    font-style: italic;
  }

  .count-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  /* ── Map geography ── */
  .graticule {
    fill: none;
    stroke: var(--graticule);
    stroke-width: 0.4px;
  }

  .sphere { fill: var(--ocean); }
</style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">D<span>.</span>R</a>
    <div class="nav-links">
      <a href="index.html#about">About</a>
      <a href="index.html#books">Books</a>
      <a href="index.html#contact">Contact</a>
      <a href="manifesto.html">Manifesto</a>
      <a href="travel-map.html" class="active">Places</a>
    </div>
  </nav>

<div id="app">
  <div class="map-header">
    <h1>Places I've <em>Been</em></h1>
    <span class="meta">Hover a highlighted country to see where</span>
  </div>
  <div class="map-wrap">
    <svg id="map"></svg>
    <div id="tooltip">
      <div class="tt-inner">
        <div class="tt-country" id="tt-name"></div>
        <div class="tt-cities" id="tt-cities"></div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch visited"></div> Visited</div>
      <div class="legend-item"><div class="legend-swatch unvisited"></div> Not yet</div>
    </div>
    <div class="count-badge">
      <div class="count-number" id="count-num">0</div>
      <div class="count-label">countries &amp; territories</div>
    </div>
  </div>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────
const visited = {
  // Sovereign nations (ISO 3166-1 numeric codes used by Natural Earth / TopoJSON)
  "United States":         { iso: "840", cities: ["Florida", "New York", "Washington D.C.", "Georgia", "North Carolina", "South Carolina", "Illinois", "Colorado", "Wisconsin", "California", "Alaska", "Massachusetts", "Pennsylvania"] },
  "England":               { iso: "ENG", cities: ["London", "Birmingham", "Bath", "Cotswolds", "Lake District", "Windsor", "Leeds", "Manchester", "Liverpool"] },
  "Wales":                 { iso: "WLS", cities: ["Cardiff", "Swansea"] },
  "Scotland":              { iso: "SCT", cities: ["Edinburgh"] },
  "Northern Ireland":      { iso: "NIR", cities: ["Belfast"] },
  "France":                { iso: "250", cities: ["Paris", "Lyon", "Marseille", "Bordeaux", "Toulouse", "Montpellier", "Strasbourg", "Colmar", "Lille"] },
  "Germany":               { iso: "276", cities: ["Frankfurt", "Munich", "Cologne", "Schwangau", "Löf"] },
  "Italy":                 { iso: "380", cities: ["Milan", "Venice", "Florence", "Pisa", "Rome", "Naples", "Pompeii", "Sorrento", "Capri"] },
  "Switzerland":           { iso: "756", cities: ["Basel", "Geneva", "Grindelwald", "Eschenbach"] },
  "Spain":                 { iso: "724", cities: ["Barcelona", "Ibiza", "Lanzarote"] },
  "Greece":                { iso: "300", cities: ["Athens", "Corfu", "Mykonos area"] },
  "Belgium":               { iso: "056", cities: ["Bruges", "Brussels"] },
  "Netherlands":           { iso: "528", cities: ["Amsterdam"] },
  "Norway":                { iso: "578", cities: ["Bergen", "Voss"] },
  "Sweden":                { iso: "752", cities: ["Östersund", "Åre"] },
  "Ireland":               { iso: "372", cities: ["Waterford", "Killarney", "Cork"] },
  "Canada":                { iso: "124", cities: ["Montreal", "Vancouver", "Niagara Falls"] },
  "Mexico":                { iso: "484", cities: ["Costa Maya", "Cabo San Lucas", "Ensenada", "Cozumel"] },
  "Jamaica":               { iso: "388", cities: ["Falmouth"] },
  "Bahamas":               { iso: "044", cities: ["Nassau", "Castaway Cay"] },
  "Barbados":              { iso: "052", cities: ["Bridgetown"] },
  "British Virgin Islands":{ iso: "092", cities: ["Road Town, Tortola"] },
  "Cayman Islands":        { iso: "136", cities: ["Grand Cayman"] },
  "Martinique":            { iso: "474", cities: ["Fort-de-France area"] },
  "Turkey":                { iso: "792", cities: ["Kusadasi"] },
  "Croatia":               { iso: "191", cities: ["Dubrovnik"] },
  "Portugal":              { iso: "620", cities: ["Funchal, Madeira"] },
  "Luxembourg":            { iso: "442", cities: ["Luxembourg City"] },
  "Iceland":               { iso: "352", cities: ["Reykjavik"] },
  "Denmark":               { iso: "208", cities: ["Denmark"] },
  "Malta":                 { iso: "470", cities: ["Malta"] },
  "Monaco":                { iso: "492", cities: ["Monaco"] },
  "Isle of Man":           { iso: "833", cities: ["Isle of Man"] },
  "Puerto Rico":           { iso: "630", cities: ["San Juan"] },
  "US Virgin Islands":     { iso: "850", cities: ["St. Thomas"] },
};

// Build lookup by ISO numeric
const visitedByIso = {};
for (const [name, data] of Object.entries(visited)) {
  visitedByIso[data.iso] = { name, cities: data.cities };
}

// UK constituent nations — we flag GB (826) and handle sub-nation display
// TopoJSON world doesn't split UK, so we'll show all UK nations under GB
const ukData = {
  "826": {
    name: "United Kingdom",
    subNations: [
      { name: "England", cities: ["London", "Birmingham", "Bath", "Cotswolds", "Lake District", "Windsor", "Leeds", "Manchester", "Liverpool"] },
      { name: "Wales", cities: ["Cardiff", "Swansea"] },
      { name: "Scotland", cities: ["Edinburgh"] },
      { name: "Northern Ireland", cities: ["Belfast"] },
    ]
  }
};

// ─── Map setup ────────────────────────────────────────────────────────────────
const svg = d3.select("#map");
const tooltip = document.getElementById("tooltip");
const ttName = document.getElementById("tt-name");
const ttCities = document.getElementById("tt-cities");
const countNum = document.getElementById("count-num");

countNum.textContent = Object.keys(visited).length;

function getSize() {
  const el = document.querySelector(".map-wrap");
  return [el.clientWidth, el.clientHeight];
}

let [W, H] = getSize();

const projection = d3.geoNaturalEarth1()
  .scale(W / 6.2)
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);
const graticule = d3.geoGraticule();

// Sphere (ocean background)
svg.append("path")
  .datum({type: "Sphere"})
  .attr("class", "sphere")
  .attr("d", path);

// Graticule lines
svg.append("path")
  .datum(graticule())
  .attr("class", "graticule")
  .attr("d", path);

const countryGroup = svg.append("g").attr("class", "countries");

// Load world topojson
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);

    countryGroup.selectAll(".country")
      .data(countries.features)
      .enter()
      .append("path")
      .attr("class", d => {
        const id = String(d.id).padStart(3, "0");
        const isVisited = visitedByIso[id] || ukData[id];
        return `country ${isVisited ? "visited" : "unvisited"}`;
      })
      .attr("d", path)
      .on("mousemove", function(event, d) {
        const id = String(d.id).padStart(3, "0");
        let data = visitedByIso[id];
        let name, cities;

        if (data) {
          name = data.name;
          cities = data.cities;
        } else if (ukData[id]) {
          // UK: show all sub-nations
          name = "United Kingdom";
          cities = ukData[id].subNations.flatMap(n => [`${n.name}: ${n.cities.join(", ")}`]);
        } else {
          return;
        }

        ttName.textContent = name;
        ttCities.innerHTML = cities.map(c => `<span class="tt-city">${c}</span>`).join("");

        positionTooltip(event);
        tooltip.classList.add("visible");
      })
      .on("mouseleave", function() {
        tooltip.classList.remove("visible");
      });
  });

function positionTooltip(event) {
  const pad = 16;
  const tw = tooltip.offsetWidth || 240;
  const th = tooltip.offsetHeight || 120;
  let x = event.clientX + 18;
  let y = event.clientY - 10;
  if (x + tw > window.innerWidth - pad) x = event.clientX - tw - 18;
  if (y + th > window.innerHeight - pad) y = window.innerHeight - th - pad;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

// Resize
window.addEventListener("resize", () => {
  [W, H] = getSize();
  projection.scale(W / 6.2).translate([W / 2, H / 2]);
  svg.selectAll("path").attr("d", path);
});
</script>
</body>
</html>
